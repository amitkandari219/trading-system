version: '3.8'

services:
  # PostgreSQL with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-db
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader123
    ports:
      - "5450:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6390:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Trading system app
  app:
    build: .
    container_name: trading-app
    environment:
      DATABASE_DSN: postgresql://trader:trader123@db:5432/trading
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TOTAL_CAPITAL: ${TOTAL_CAPITAL:-1000000}  # Default ₹10L, override to scale
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  pgdata:
  redisdata:
